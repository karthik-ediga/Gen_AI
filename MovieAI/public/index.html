<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas AI</title>
    <style>
      :root {
  --bg: #030712;
  --panel: rgba(15, 23, 42, 0.55);
  --panel2: rgba(30, 41, 59, 0.6);
  --text: #f8fafc;
  --muted: #9ca3af;
  --accent: #7c3aed;
  --accent2: #4f46e5;
  --border: rgba(255,255,255,0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: Inter, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 30%, rgba(124,58,237,.25), transparent 30%),
    radial-gradient(circle at 85% 20%, rgba(79,70,229,.2), transparent 25%),
    radial-gradient(circle at 75% 75%, rgba(56,189,248,.12), transparent 20%),
    #020617;
}

/* STAR OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(white 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.12;
  pointer-events: none;
}

/* BOTTOM WAVE GLOW */
body::after {
  content: "";
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 250px;
  background:
    radial-gradient(circle at 50% 100%, rgba(139,92,246,.3), transparent 55%);
  filter: blur(60px);
  pointer-events: none;
}

.app {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 32px 24px 20px;
  text-align: center;
}

.brand {
  font-size: 2.4rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ffffff, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  margin-top: 10px;
  color: var(--muted);
  font-size: 1rem;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 30px 20px 140px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  scrollbar-width: none;
}

.messages::-webkit-scrollbar {
  display: none;
}

.message {
  max-width: 700px;
  width: fit-content;
  padding: 18px 20px;
  border-radius: 22px;
  line-height: 1.7;
  font-size: 0.96rem;
  animation: fade 0.25s ease;
  backdrop-filter: blur(24px);
}

.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #6d28d9, #4f46e5);
  box-shadow: 0 0 30px rgba(124,58,237,.25);
}

.message.assistant {
  align-self: flex-start;
  background: rgba(17, 24, 39, 0.7);
  border: 1px solid rgba(139,92,246,.2);
  box-shadow: 0 0 30px rgba(0,0,0,.25);
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.typing {
  display: flex;
  gap: 5px;
}

.typing span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #c4b5fd;
  animation: blink 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

@keyframes blink {
  0%, 80%, 100% {
    transform: scale(.7);
    opacity: .4;
  }
  40% {
    transform: scale(1);
    opacity: 1;
  }
}

/* FLOATING INPUT BAR */
.composer {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: min(1100px, 90%);
  display: flex;
  gap: 14px;
  padding: 14px;
  border-radius: 30px;
  background: rgba(17, 24, 39, 0.75);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(139,92,246,.2);
  box-shadow:
    0 0 30px rgba(124,58,237,.12),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.composer input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 1rem;
  padding: 10px 16px;
}

.composer input::placeholder {
  color: #9ca3af;
}

.composer button {
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: white;
  font-size: 22px;
  cursor: pointer;
  transition: .25s;
  box-shadow: 0 0 25px rgba(124,58,237,.35);
}

.composer button:hover {
  transform: scale(1.06);
}

.composer button:disabled {
  opacity: 0.6;
}

@media (max-width: 768px) {
  .brand {
    font-size: 1.7rem;
  }

  .message {
    max-width: 92%;
  }

  .composer {
    bottom: 14px;
  }
}
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="brand">✦ CineAtlas.io</div>
        <p>Ask, explore, and discover. Get instant answers, personalized recommendations, and insightful conversations.</p>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <input id="prompt" placeholder="Ask about movies or recommendations..." />
        <button id="sendBtn">↑</button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('prompt');
      const sendBtn = document.getElementById('sendBtn');

      function addMessage(text, role) {
        const bubble = document.createElement('div');
        bubble.className = `message ${role}`;
        if (role === 'assistant' && text === 'Thinking…') {
          bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
        } else {
          bubble.textContent = text;
        }
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addWelcomeMessage() {
        addMessage("Hi! I'm your AI assistant. Ask me anything");
      }

      async function sendMessage(customText) {
        const message = (customText || inputEl.value).trim();
        if (!message) return;

        addMessage(message, 'user');
        inputEl.value = '';
        sendBtn.disabled = true;
        addMessage('Thinking…', 'assistant');

        try {
          const response = await fetch('/api/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });
          const data = await response.json();
          messagesEl.removeChild(messagesEl.lastChild);
          if (!response.ok) {
            addMessage(data.error || 'Something went wrong.', 'assistant');
          } else {
            addMessage(data.reply || 'No response.', 'assistant');
          }
        } catch (error) {
          messagesEl.removeChild(messagesEl.lastChild);
          addMessage('Unable to reach the assistant right now.', 'assistant');
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener('click', () => sendMessage());
      inputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendMessage();
        }
      });

      addWelcomeMessage();
    </script>
  </body>
</html>
